spring.application.name=API Pokedex

# Configuracion MYSQL
#poner ruta con la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/pokedex?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA
# 'create' borrar· los datos existentes y recrear· la BD
# Para desarrollo continuo, 'update' suele ser m·s seguro.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Para ver las SQL que se ejecutan poner las siguientes:
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true